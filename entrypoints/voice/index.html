<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Voice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 140px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #fff;
      padding: 10px 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-radius: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pulse {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1s infinite;
      flex-shrink: 0;
    }
    .pulse.done { background: #22c55e; animation: none; }
    .pulse.error { background: #f59e0b; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }
    .text {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .debug {
      font-size: 10px;
      color: #64748b;
      font-family: monospace;
      line-height: 1.4;
    }
    .debug .val { color: #94a3b8; }
    .transcript {
      font-size: 11px;
      color: #a5b4fc;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="row">
    <div class="pulse" id="indicator"></div>
    <div class="text" id="status">Starting...</div>
  </div>
  <div class="debug" id="debug"></div>
  <div class="transcript" id="transcript"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
